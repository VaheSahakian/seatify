services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seatify
      POSTGRES_USER: seatify
      POSTGRES_PASSWORD: seatify_secret
    ports:
      - "5433:5432"
    volumes:
      - seatify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seatify"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seatify
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  seatify_pgdata:
